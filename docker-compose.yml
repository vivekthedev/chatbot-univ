# MySQL for the university chatbot. Host port 5439 → container 3306 (per project convention).
services:
  mysql:
    image: mysql:8.0
    container_name: university-chatbot-mysql
    restart: unless-stopped
    ports:
      - "5439:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: university_chatbot
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
    volumes:
      - ./university_chatbot.sql:/docker-entrypoint-initdb.d/01-university_chatbot.sql:ro
